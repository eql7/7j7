<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سجلي الأكاديمي - جامعة الإمام</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #ffffff;
            color: #333;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        header, footer {
            font-size: 1.5em;
            font-weight: bold;
            margin: 20px 0;
            color: #000;
        }
        .grades-container {
            margin: 40px auto;
            max-width: 400px;
        }
        .course-card {
            border-bottom: 1px solid #ccc;
            padding: 10px 0;
            text-align: right;
        }
        .course-name { font-weight: bold; }
        .course-grade { color: #555; margin-right: 10px; }
        .gpa-section {
            margin-top: 50px;
            font-size: 2em;
            font-weight: bold;
            color: #000;
        }
    </style>
</head>
<body>

    <header>جامعة الإمام محمد بن سعود الإسلامية</header>

    <div class="grades-container">
        <div class="course-card"><span class="course-name">تعلم جامعي:</span> <span class="course-grade">أ+</span></div>
        <div class="course-card"><span class="course-name">مهارات الذكاء الاصطناعي:</span> <span class="course-grade">أ+</span></div>
        <div class="course-card"><span class="course-name">اللغة الإنجليزية:</span> <span class="course-grade">ب+</span></div>
        <div class="course-card"><span class="course-name">المهارات اللغوية:</span> <span class="course-grade">ب+</span></div>
        <div class="course-card"><span class="course-name">مبادئ الإحصاء:</span> <span class="course-grade">أ+</span></div>
        <div class="course-card"><span class="course-name">القرآن الكريم:</span> <span class="course-grade">ب</span></div>
    </div>

    <div class="gpa-section">
        المعدل: 4.69
    </div>

    <footer>جامعة الإمام محمد بن سعود الإسلامية</footer>

</body>
</html>
